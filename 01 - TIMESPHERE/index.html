<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMESPHERE</title>
<link rel="stylesheet" href="assets/style.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/image/MK.png" type="image/png">

</head>

<body>

<div class="wrapper">

  <select id="country">
    <option value="Asia/Kolkata">India</option>
    <option value="America/New_York">USA</option>
    <option value="Europe/London">UK</option>
    <option value="Asia/Dubai">Dubai</option>
    <option value="Asia/Tokyo">Japan</option>
    <option value="Australia/Sydney">Australia</option>
    <option value="America/Toronto">Canada</option>
    <option value="Europe/Berlin">Germany</option>
  </select>

  <div class="clock" aria-label="00:00:00 AM">

    <div class="clock__block clock__block--delay2" data-time-group>
      <div class="clock__digit-group">
        <div class="clock__digits" data-time="a">00</div>
        <div class="clock__digits" data-time="b">00</div>
      </div>
    </div>

    <div class="clock__colon"></div>

    <div class="clock__block clock__block--delay1" data-time-group>
      <div class="clock__digit-group">
        <div class="clock__digits" data-time="a">00</div>
        <div class="clock__digits" data-time="b">00</div>
      </div>
    </div>

    <div class="clock__colon"></div>

    <div class="clock__block" data-time-group>
      <div class="clock__digit-group">
        <div class="clock__digits" data-time="a">00</div>
        <div class="clock__digits" data-time="b">00</div>
      </div>
    </div>

    <div class="clock__block clock__block--small">
      <div id="ampm">AM</div>
    </div>

  </div>

</div>

<script src="assets/index.js" defer></script>

</body>
</html>
