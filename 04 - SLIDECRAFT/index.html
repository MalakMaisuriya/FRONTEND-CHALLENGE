<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SLIDECRAFT</title>
  <link rel="icon" href="assets/images/MK.png" type="image/png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="container">

    <div class="slide">

        <div class="item" style="background-image: url(https://i.ibb.co/qCkd9jS/img1.jpg);">
            <div class="content">
                <div class="name">Switzerland</div>
                <div class="des">Beautiful mountains & views</div>
                <button>See More</button>
            </div>
        </div>

        <div class="item" style="background-image: url(https://i.ibb.co/jrRb11q/img2.jpg);">
            <div class="content">
                <div class="name">Finland</div>
                <div class="des">Land of northern lights</div>
                <button>See More</button>
            </div>
        </div>

        <div class="item" style="background-image: url(https://i.ibb.co/NSwVv8D/img3.jpg);">
            <div class="content">
                <div class="name">Iceland</div>
                <div class="des">Fire & ice beauty</div>
                <button>See More</button>
            </div>
        </div>

        <div class="item" style="background-image: url(https://i.ibb.co/Bq4Q0M8/img4.jpg);">
            <div class="content">
                <div class="name">Australia</div>
                <div class="des">Explore wild nature</div>
                <button>See More</button>
            </div>
        </div>

        <div class="item" style="background-image: url(https://i.ibb.co/jTQfmTq/img5.jpg);">
            <div class="content">
                <div class="name">Netherlands</div>
                <div class="des">Windmills & flowers</div>
                <button>See More</button>
            </div>
        </div>

        <div class="item" style="background-image: url(https://i.ibb.co/RNkk6L0/img6.jpg);">
            <div class="content">
                <div class="name">Ireland</div>
                <div class="des">Green landscapes</div>
                <button>See More</button>
            </div>
        </div>

    </div>

    <div class="button">
        <button class="prev"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="next"><i class="fa-solid fa-arrow-right"></i></button>
    </div>

</div>

<script src="assets/js/script.js"></script>
</body>
</html>
